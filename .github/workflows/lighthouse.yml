name: Lighthouse

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lhci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run LHCI collect
        run: npm run lhci:collect

      - name: Append results to markdown
        run: npm run lhci:append

      - name: Upload README files with lighthouse section
        uses: actions/upload-artifact@v4
        with:
          name: readme-with-lighthouse
          path: |
            README.md
            README.sv.md

      - name: Upload raw lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-raw
          path: .lighthouseci
          if-no-files-found: ignore
